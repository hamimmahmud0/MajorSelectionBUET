{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-4xl mb-2">🔐</div>
            <h1 class="text-2xl font-bold text-buet-blue">Admin Login</h1>
            <p class="text-gray-500 text-sm mt-1">Authorized personnel only</p>
        </div>

        <form method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-buet-blue focus:border-buet-blue outline-none transition"
                       required>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password"
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-buet-blue focus:border-buet-blue outline-none transition"
                       required>
            </div>
            <button type="submit"
                    class="w-full bg-buet-blue text-white py-2.5 rounded-lg font-medium hover:bg-blue-900 transition shadow-md">
                Login
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-gray-100 text-center">
            <a href="{{ url_for('auth.login') }}" class="text-sm text-gray-500 hover:text-buet-blue transition">
                🎓 Student Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
